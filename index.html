<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Replacement Simulator</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    margin-top: 30px;
}

input {
    padding: 10px;
    margin: 10px;
    width: 250px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 5px;
    background: #22c55e;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #16a34a;
}

.output {
    margin-top: 20px;
    text-align: left;
    display: inline-block;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    width: 650px;
}

h2 {
    color: #38bdf8;
}

.best {
    color: #facc15;
    font-size: 20px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Page Replacement Simulator</h1>

    <input type="text" id="pages" placeholder="Enter pages (e.g. 1 2 3 4 1 2)">
    <br>
    <input type="number" id="frames" placeholder="Enter number of frames">

    <br>
    <button onclick="runAll()">Run All Algorithms</button>

    <div class="output" id="output"></div>
</div>

<script>

function getInput() {
    let pages = document.getElementById("pages").value.split(" ").map(Number);
    let frames = parseInt(document.getElementById("frames").value);
    return { pages, frames };
}

/* FIFO */
function fifo(pages, frames) {
    let frame = Array(frames).fill(-1);
    let index = 0, faults = 0;

    pages.forEach(p => {
        if (!frame.includes(p)) {
            frame[index] = p;
            index = (index + 1) % frames;
            faults++;
        }
    });

    return faults;
}

/* LRU */
function lru(pages, frames) {
    let frame = Array(frames).fill(-1);
    let time = Array(frames).fill(0);
    let counter = 0, faults = 0;

    pages.forEach(p => {
        let idx = frame.indexOf(p);

        if (idx !== -1) {
            counter++;
            time[idx] = counter;
        } else {
            let min = Math.min(...time);
            let pos = time.indexOf(min);

            frame[pos] = p;
            counter++;
            time[pos] = counter;
            faults++;
        }
    });

    return faults;
}

/* Optimal */
function optimal(pages, frames) {
    let frame = Array(frames).fill(-1);
    let faults = 0;

    for (let i = 0; i < pages.length; i++) {
        let p = pages[i];

        if (!frame.includes(p)) {
            let pos = -1, farthest = i + 1;

            for (let j = 0; j < frames; j++) {
                let k;
                for (k = i + 1; k < pages.length; k++) {
                    if (frame[j] === pages[k]) {
                        if (k > farthest) {
                            farthest = k;
                            pos = j;
                        }
                        break;
                    }
                }

                if (k === pages.length) {
                    pos = j;
                    break;
                }
            }

            if (pos === -1) pos = 0;

            frame[pos] = p;
            faults++;
        }
    }

    return faults;
}

/* RUN ALL + COMPARISON */
function runAll() {
    let { pages, frames } = getInput();

    let fifoFaults = fifo(pages, frames);
    let lruFaults = lru(pages, frames);
    let optFaults = optimal(pages, frames);

    let best = "";

    if (optFaults <= lruFaults && optFaults <= fifoFaults)
        best = "Optimal";
    else if (lruFaults <= fifoFaults)
        best = "LRU";
    else
        best = "FIFO";

    let output = `
        <h2>Comparison Result</h2>
        FIFO Faults : ${fifoFaults} <br>
        LRU Faults : ${lruFaults} <br>
        Optimal Faults : ${optFaults} <br>

        <div class="best">Best Algorithm: ${best}</div>
    `;

    document.getElementById("output").innerHTML = output;
}

</script>

</body>
</html>

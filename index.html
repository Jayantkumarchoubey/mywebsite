<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Replacement Simulator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    margin-top: 40px;
}

input {
    padding: 10px;
    margin: 10px;
    width: 250px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #38bdf8;
    color: black;
    font-weight: bold;
}

button:hover {
    background: #0ea5e9;
}

.output {
    margin-top: 20px;
    text-align: left;
    display: inline-block;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    max-width: 600px;
}

.step {
    margin: 5px 0;
}
</style>
</head>

<body>

<div class="container">
    <h1>Page Replacement Simulator</h1>

    <input type="text" id="pages" placeholder="Enter pages (e.g. 1 2 3 4 1 2)">
    <br>
    <input type="number" id="frames" placeholder="Enter number of frames">

    <br>

    <button onclick="runFIFO()">FIFO</button>
    <button onclick="runLRU()">LRU</button>
    <button onclick="runOptimal()">Optimal</button>

    <div class="output" id="output"></div>
</div>

<script>
function getInput() {
    let pages = document.getElementById("pages").value.split(" ").map(Number);
    let frames = parseInt(document.getElementById("frames").value);
    return { pages, frames };
}

function display(title, steps, faults) {
    let output = `<h2>${title}</h2>`;
    steps.forEach(s => output += `<div class="step">${s}</div>`);
    output += `<h3>Total Page Faults: ${faults}</h3>`;
    document.getElementById("output").innerHTML = output;
}

/* FIFO */
function runFIFO() {
    let { pages, frames } = getInput();
    let frame = Array(frames).fill(-1);
    let index = 0, faults = 0;
    let steps = [];

    pages.forEach(p => {
        if (!frame.includes(p)) {
            frame[index] = p;
            index = (index + 1) % frames;
            faults++;
        }
        steps.push(`Page ${p} → ${frame.join(" ")}`);
    });

    display("FIFO", steps, faults);
}

/* LRU */
function runLRU() {
    let { pages, frames } = getInput();
    let frame = Array(frames).fill(-1);
    let time = Array(frames).fill(0);
    let counter = 0, faults = 0;
    let steps = [];

    pages.forEach(p => {
        let idx = frame.indexOf(p);

        if (idx !== -1) {
            counter++;
            time[idx] = counter;
        } else {
            let min = Math.min(...time);
            let pos = time.indexOf(min);

            frame[pos] = p;
            counter++;
            time[pos] = counter;
            faults++;
        }

        steps.push(`Page ${p} → ${frame.join(" ")}`);
    });

    display("LRU", steps, faults);
}

/* Optimal */
function runOptimal() {
    let { pages, frames } = getInput();
    let frame = Array(frames).fill(-1);
    let faults = 0;
    let steps = [];

    for (let i = 0; i < pages.length; i++) {
        let p = pages[i];

        if (!frame.includes(p)) {
            let pos = -1, farthest = i + 1;

            for (let j = 0; j < frames; j++) {
                let k;
                for (k = i + 1; k < pages.length; k++) {
                    if (frame[j] === pages[k]) {
                        if (k > farthest) {
                            farthest = k;
                            pos = j;
                        }
                        break;
                    }
                }

                if (k === pages.length) {
                    pos = j;
                    break;
                }
            }

            if (pos === -1) pos = 0;

            frame[pos] = p;
            faults++;
        }

        steps.push(`Page ${p} → ${frame.join(" ")}`);
    }

    display("Optimal", steps, faults);
}
</script>

</body>
</html>
